        text-shadow: 2px 2px 2px #000;

    .tile {
        position: relative;
    }
    /* .fox-head::before, */
    .tile::before {
        content: attr(data-count);
        /* content: "0"; */
        position: absolute;
        top: 0%; left: 50%;
        transform: translateX(-50%) translateY(0%) rotateX(90deg);
        /* transform: translateX(50%) translateY(0%) rotateX(0deg); */
        transform: translateX(50%) translateY(0%) rotateY(90deg);
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(.75);
        background-color: #000;
        color: #fff;
        outline: 1px solid #fff8;
        border-radius: 4px;
        padding: 1px 2px;
        opacity: .25;
        font-size: 8px;
        transition: transform 100ms ease-in-out;
    }
    .tile:hover::before {
        content: attr(data-count);
        position: absolute;
        top: 0%; left: 50%;
        transform: translateX(-50%) translateY(-100%) rotateX(0deg);
        transform: translateX(50%) translateY(0%) rotateX(0deg);
        transform: translateX(50%) translateY(0%) rotateX(0deg) scale(1.2);
        transform: translateX(50%) translateY(0%) rotateX(0deg) scale(1);
        opacity: 1;
    }

    .fox-head::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1);
        opacity: 1;
    }
    .fox-tail::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1);
        opacity: .25;
    }

    .fox-head:hover::before,
    .fox-tail:hover::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1.5);
        opacity: 1;
        background-color: hsla(var(--hue), 100%, 60%, 0.6);
        text-shadow: 2px 2px 2px #000;
        text-shadow: 1px 1px 0px #000, 1px 1px 4px #000;

function EmojiEncoding(elist){
    iconVal = {};
    iconValr = {};
    iconRow = [...elist.split('')];
    for (let i = 0; i < 26; i++) {
        let eChar = String.fromCharCode(i+65);
        let eIcon = iconRow[i];
        iconVal[eIcon] = eChar;
        iconValr[eChar] = eIcon;
    }

function ReplaceOnRow(y,e,index){
    let score = 0;
    for(let i = index; i < gs.w; i++){
        console.log(`ReplaceOnRow -> y:${y}, x:${i};`);
        let tile = document.getElementById(`y${y},x${i}`);
        let tileIcon = tile.dataset.val;
        if(tileIcon == e){
            score++;
            tile.classList.toggle("scored");
            let newVal = randomVal();
            // tile.innerText = newVal;
            tile.innerHTML = newVal;
            tile.dataset.val = newVal;
            setTimeout(() => {
                tile.classList.toggle("scored");
            }, 900);
        } else {
            i = gs.w;
        }
    }
    ScoreUp(score);
}
function ReplaceOnCol(x,e,index){

        }
    }
    ScoreUp(score);
}
