<style>
    .class {}
    .display {

    .word {
        --c: hsla(150, 100%, 40%, 1);
        --c: hsla(150, 100%, 40%, 1);
        --c1: hsla(150, 80%, 100%, 1);
        --c2: hsla(150, 50%, 30%, .75);
        --c3: hsla(150, 50%, 70%, .75);
        padding: 2px 8px;
        padding: 8px 12px;
        margin: 8px;
        border: 2px solid var(--c);
        border-radius: 8px;
        color: var(--c1);
        font-size: 16px;
        box-shadow: 0px 0px 2px 0px var(--c), inset 0px 0px 4px 0px var(--c);

        display: flex;
        align-items: center; justify-content: center;
        flex-direction: column;
    }
    .japanese {
        display: flex;
        flex-direction: row;
    }
    .syl {
        flex-direction: column;
    }
    /* first is Romaji */
    .syl > div:nth-child(1) {
        color: var(--c2);
        color: #0000;
    }
    .syl > div:nth-child(2) {
        font-weight: bold;
        font-size: 20px;
    }
    .spanish {
        color: var(--c3);
        color: #0000;
    }

    #toggleRomaji:not(:checked) ~ main .syl > div:nth-child(1) {
        color: #0000;
    }
    #toggleRomaji:checked ~ main .syl > div:nth-child(1) {
        color: var(--c2);
    }
    #toggleSpanish:not(:checked) ~ main .spanish {
        color: #0000;
    }
    #toggleSpanish:checked ~ main .spanish {
        color: var(--c3);
    }

    #toggleSpanish,
    #toggleRomaji {display: none;}
    #toggleSpanish:checked ~ .options .toggleCheckboxLabel[for="toggleSpanish"],
    #toggleRomaji:checked ~ .options .toggleCheckboxLabel[for="toggleRomaji"] {
        color: var(--bwe);
        --clr-outline: var(--bwc);
        --bgc-before: #063;
        --bgc-after: #0c6;
        --ttx-after: 1rem;

    /* ─── Events ─── */
    function updateSettings(){
        s.h = window.innerHeight;
        s.w = window.innerWidth;
        s.dim = Math.sqrt(s.h * s.h + s.w * s.w);

        /* ─ Canvas ─ */
        s.canvas.x = s.w;
        s.canvas.y = s.h;
        s.canvas.z = (s.h + s.w)/2;

        s.canvas.x2 = s.canvas.x/2;
        s.canvas.y2 = s.canvas.y/2;
        s.canvas.z2 = s.canvas.z/2;

        /* ─ Box ─ */
        /* resize box for mobile */
        if(s.h < s.box.y) {s.box.y = s.h;}
        if(s.w < s.box.x) {s.box.x = s.w;}
        s.box.z = (s.box.y + s.box.x)/2;

        /* center box */
        s.box.top = (s.h - s.box.y)/2;
        s.box.left = (s.w - s.box.x)/2;

        /* determine center */
        s.box.x2 = s.box.left + (s.box.x / 2);
        s.box.y2 = s.box.top + (s.box.y / 2);
        s.box.z2 = (s.box.z / 2);

        /* ─ Grid ─ */
        s.grid.cols = Math.floor(s.w / s.tile.w);
        s.grid.rows = Math.floor(s.h / s.tile.h);

        /* ─ Canvas Update ─ */
        // canvas.width = s.canvas.x;
        // canvas.height = s.canvas.y;
        // ctx.clearRect(0,0,canvas.width, canvas.height);
    }
    window.addEventListener('resize', () =>{
        updateSettings();
    });
