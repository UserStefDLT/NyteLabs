<style>
    :root {
        --tile-sz: 24px;
        --tile-sz: 36px;
        --tile-sz: 32px;
        --tile-sz: 28px;
        --tile-m: 1px;
        --tile-space: calc(var(--tile-sz) + var(--tile-m) * 2);
        --tile-count: 12;
        --grid-sz: calc(var(--tile-space) * var(--tile-count));
        
        /* Light Version */
        --tile-m: 2px;
        --tile-space: calc(var(--tile-sz) + var(--tile-m) * 2);
        --tile-count: 12;
        --grid-sz: calc(var(--tile-space) * var(--tile-count) + var(--tile-m) * 1);
    }
    .grid, .row, .tile,
    .mgrid, .mrow, .mtile {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .grid, .mgrid {
        flex-direction: column;
        min-height: var(--grid-sz);
        min-width: var(--grid-sz);
    }
    .row, .mrow {flex-direction: row;}
    .mrow {
        min-height: var(--tile-sz);
        min-width: var(--grid-sz);
    }
    .mtile,
    .tile {
        margin: var(--tile-m);
        width: var(--tile-sz);
        height: var(--tile-sz);
        user-select: none;
        /* cursor: pointer; */
        /* cursor: grab; */
    }
    /* #mouse-display.grabbing,
    .mtile.grabbing {
        cursor: grabbing;
    } */
    .mgrid {cursor: grab;}
    .mgrid.grabbing {cursor: grabbing;}
    .tile {
        /* outline: 1px solid #39f; */
        border-radius: 50%;
    }
    /* .tile:hover {
        background-color: #39f6;
    } */
    [data-selected="true"] {
        background-color: #39f6;
        box-shadow: 0 0 2px 2px #39f9;
    }
    #score {
        user-select: none;
    }
    .tile[data-scored="1"] {
        background-color: #fd36;
        box-shadow: 0 0 4px 3px #ff09;
    }
    .scored {
        /* background-color: #fd36; */
        box-shadow: 0 0 4px 3px #ff09;
        animation: score-glow 900ms linear 1 forwards;
    }
    @keyframes score-glow {
        0% {box-shadow: 0 0 4px 3px #ff09;}
        100% {box-shadow: 0 0 4px 3px #ff00;}
    }


    .tile:hover {
        background-image: radial-gradient(#0000 50%, #000 70%);
        background-image: radial-gradient(#0000 20%, #0008 100%);
        /* background-image: radial-gradient(); */
    }

    .fox {
        background-color: #fd36;
        background-color: hsla(50, 100%, 60%, 0.4);
        outline: 1px solid orange;
    }
    .fox2 {
        background-color: #fd33;
        background-color: hsla(50, 100%, 60%, 0.2);
        outline: 1px solid hsl(39, 100%, 30%);
    }
    .match-found,
    .fox-head {
        position: relative;
        --hue: 50;
        background-color: #fd36;
        background-color: hsla(50, 100%, 60%, 0.4);
        background-color: hsla(var(--hue), 100%, 60%, 0.6);
        /* outline: 1px solid orange; */
        /* outline: 1px solid hsl(var(--hue), 100%, 50%); */
        text-shadow: 2px 2px 2px #000;
        border-radius: 50%;
        border-radius: 0%;
    }
    .fox-tail {
        --hue: 50;
        background-color: #fd33;
        background-color: hsla(50, 100%, 60%, 0.2);
        background-color: hsla(var(--hue), 100%, 60%, 0.3);
        /* outline: 1px solid hsl(39, 100%, 30%); */
        /* outline: 1px solid hsl(var(--hue), 100%, 30%); */
        text-shadow: 2px 2px 2px #000;
    }
    .mtile, 
    .tile {
        position: absolute;
        --y-off: 1;
        --x-off: 1;
        --yt: calc(var(--y-off) * 24px);
        --xt: calc(var(--x-off) * 24px);
        --yt: calc(var(--y-off) * var(--tile-space));
        --xt: calc(var(--x-off) * var(--tile-space));
        margin: var(--tile-m);
        width: var(--tile-sz);
        height: var(--tile-sz);
        top: 0; left: 0;
        transform: translateX(var(--xt)) translateY(var(--yt));
        transition: transform 50ms ease-in-out;
        transition: transform 200ms ease-in-out;
    }
    .mtile:hover {
        background-image: radial-gradient(#0000 50%, #000 70%);
        background-image: radial-gradient(#0000 20%, #fff8 100%);
        /* background-image: radial-gradient(); */
    }
    /* .fox-head::before, */
    .tile::before {
        content: attr(data-count);
        /* content: "0"; */
        position: absolute;
        top: 0%; left: 50%;
        transform: translateX(-50%) translateY(0%) rotateX(90deg);
        /* transform: translateX(50%) translateY(0%) rotateX(0deg); */
        transform: translateX(50%) translateY(0%) rotateY(90deg);
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(.75);
        background-color: #000;
        color: #fff;
        outline: 1px solid #fff8;
        border-radius: 4px;
        padding: 1px 2px;
        opacity: .25;
        font-size: 8px;
        transition: transform 100ms ease-in-out;
    }
    .tile:hover::before {
        content: attr(data-count);
        position: absolute;
        top: 0%; left: 50%;
        transform: translateX(-50%) translateY(-100%) rotateX(0deg);
        transform: translateX(50%) translateY(0%) rotateX(0deg);
        transform: translateX(50%) translateY(0%) rotateX(0deg) scale(1.2);
        transform: translateX(50%) translateY(0%) rotateX(0deg) scale(1);
        opacity: 1;
    }

    .match-found::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1);
        opacity: 1;
    }
    .fox-head::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1);
        opacity: 1;
    }
    .fox-tail::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1);
        opacity: .25;
    }

    .match-found:hover::before,
    .fox-head:hover::before,
    .fox-tail:hover::before {
        transform: translateX(50%) translateY(0%) rotateY(0deg) scale(1.5);
        opacity: 1;
        background-color: hsla(var(--hue), 100%, 60%, 0.6);
        text-shadow: 2px 2px 2px #000;
        text-shadow: 1px 1px 0px #000, 1px 1px 4px #000;
        outline: 1px solid #0000;
        box-shadow: 1px 1px 4px #000;
    }


    /* .row {
        display: flex;
        flex-direction: row;
    } */
    .btn-find-foxes {
        color: #fff;
        background-image: linear-gradient(#fff 45%, hsla(30, 100%, 50%) 55%);
        border-radius: 100px;
        font-weight: bold;
        text-shadow: 0px 0px 1px #000, 1px 1px 2px #000, 1px 1px 4px #000;

    .tag-bubble {

        outline: 1px solid hsla(39, 100%, 50%, .5);
        padding: 2px 4px;
        opacity: 0;
        z-index: -1;
        transition: transform 300ms ease-in-out, opacity 300ms ease-in-out;
    }
    .tag-bubble:hover::before {
        transform: translateX(-50%) translateY(-100%) scale(1);
        opacity: 1;

    }
